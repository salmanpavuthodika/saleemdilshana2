<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow for the Seal -->
    <filter id="seal-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#40020A" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#40020A" flood-opacity="0.3" />
    </filter>

    <!-- Bevel and 3D Emboss Effect -->
    <filter id="emboss" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.2" specularExponent="18" lighting-color="#ffb3ba" result="specOut">
        <fePointLight x="180" y="100" z="250" />
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litPaint" />
    </filter>

    <!-- Base Gradient for the Wax -->
    <radialGradient id="wax-grad" cx="42%" cy="38%" r="60%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#E2263F" />
      <stop offset="35%" stop-color="#BD142B" />
      <stop offset="70%" stop-color="#8C091A" />
      <stop offset="100%" stop-color="#54020C" />
    </radialGradient>

    <!-- Highlight Overlay Gradient -->
    <linearGradient id="highlight-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4" />
    </linearGradient>

    <!-- Calligraphy Shadow -->
    <filter id="calligraphy-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#300105" flood-opacity="0.8" />
      <feDropShadow dx="-1" dy="-1" stdDeviation="1" flood-color="#ff9999" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- 1. Irregular Outer Melted Wax Layer -->
  <g filter="url(#seal-shadow)">
    <path d="M 250 30 
             C 310 28, 360 40, 395 75 
             C 430 110, 465 155, 470 215 
             C 475 275, 455 330, 420 380 
             C 385 430, 330 465, 270 472 
             C 210 479, 150 460, 105 425 
             C 60 390, 30 335, 28 275 
             C 26 215, 45 160, 80 115 
             C 115 70, 190 32, 250 30 Z" 
          fill="url(#wax-grad)" />

    <!-- Organic melting folds and extra volume layers -->
    <path d="M 120 70 C 170 50, 220 55, 270 65 C 320 75, 370 100, 400 140 C 430 180, 440 230, 435 280 C 430 330, 400 370, 360 410 C 320 450, 260 460, 200 450 C 140 440, 95 400, 75 350 C 55 300, 60 240, 75 180 C 90 120, 100 80, 120 70 Z" 
          fill="url(#wax-grad)" opacity="0.85" />

    <!-- 2. Inner Stamped Rim (Foil Border) -->
    <circle cx="250" cy="250" r="185" fill="none" stroke="#68010B" stroke-width="8" opacity="0.4" />
    <circle cx="250" cy="250" r="185" fill="none" stroke="#FFA3B1" stroke-width="3" opacity="0.2" />

    <!-- The Raised Inner Seal Area -->
    <circle cx="250" cy="250" r="180" fill="url(#wax-grad)" />
    
    <!-- Outer rim shine/bevel simulating high 3D ridge -->
    <path d="M 250 65 A 185 185 0 0 1 435 250 A 185 185 0 0 1 250 435 A 185 185 0 0 1 65 250 A 185 185 0 0 1 250 65 Z" 
          fill="none" stroke="url(#highlight-grad)" stroke-width="14" opacity="0.8" />

    <!-- Deep Inset Ridge for the Stamp Base -->
    <circle cx="250" cy="250" r="172" fill="none" stroke="#480007" stroke-width="6" opacity="0.75" />
    <circle cx="250" cy="250" r="170" fill="none" stroke="#FF8E9E" stroke-width="2" opacity="0.3" />
  </g>

  <!-- 3. High-Fidelity Arabic Calligraphy of Bismillah (circular vector art in cream-white) -->
  <g fill="#FCFBF2" filter="url(#calligraphy-shadow)" id="bismillah-calligraphy" transform="translate(10, 10) scale(0.96)">
    <!-- Central Main Calligraphic Letters and Flourishes -->
    <!-- vertical Alif-like strokes of Bismillah -->
    <path d="M 240 135 C 243 135, 245 150, 245 180 C 245 210, 243 235, 240 235 C 237 235, 235 210, 235 180 C 235 150, 237 135, 240 135 Z" />
    <path d="M 265 140 C 268 140, 270 160, 270 195 C 270 230, 268 250, 265 250 C 262 250, 260 230, 260 195 C 260 160, 262 140, 265 140 Z" />
    <path d="M 220 145 C 223 145, 225 162, 225 190 C 225 218, 223 230, 220 230 C 217 230, 215 218, 215 190 C 215 162, 217 145, 220 145 Z" />
    <path d="M 200 155 C 203 155, 205 170, 205 195 C 205 220, 203 232, 200 232 C 197 232, 195 220, 195 195 C 195 170, 197 155, 200 155 Z" />
    
    <!-- Symmetrical and circular sweeping arcs of Thuluth style -->
    <!-- Lower wide sweeping stroke -->
    <path d="M 100 270 C 130 330, 210 365, 250 365 C 310 365, 380 325, 410 270 C 413 265, 410 262, 405 265 C 375 315, 310 350, 250 350 C 200 350, 125 320, 105 265 C 102 260, 97 265, 100 270 Z" />

    <!-- Upper sweeping curve -->
    <path d="M 120 210 C 150 170, 200 155, 250 155 C 310 155, 360 175, 390 220 C 393 225, 390 228, 385 225 C 355 185, 310 168, 250 168 C 205 168, 145 180, 125 215 C 122 220, 117 215, 120 210 Z" />

    <!-- Middle dynamic calligraphy text paths representing the wordings -->
    <path d="M 150 260 C 165 240, 185 245, 195 265 C 200 275, 185 295, 165 295 C 150 295, 140 280, 150 260 Z M 165 265 C 160 275, 165 285, 172 285 C 180 285, 185 275, 180 265 C 175 255, 170 255, 165 265 Z" />
    <path d="M 310 260 C 325 240, 345 245, 355 265 C 360 275, 345 295, 325 295 C 310 295, 300 280, 310 260 Z M 325 265 C 320 275, 325 285, 332 285 C 340 285, 345 275, 340 265 C 335 255, 330 255, 325 265 Z" />

    <!-- Specific Calligraphic Letters & Diacritics (Harakat / Tashkeel) -->
    <!-- Fathah, Dammah, Kasrah and Shaddah symbols inside the medallion -->
    <!-- Shaddah (w-like symbol) -->
    <path d="M 245 110 C 247 105, 253 105, 255 110 C 257 105, 263 105, 265 110 C 267 115, 263 125, 255 125 C 247 125, 243 115, 245 110 Z" />
    <path d="M 195 130 C 197 125, 203 125, 205 130 C 207 125, 213 125, 215 130 C 217 135, 213 145, 205 145 C 197 145, 193 135, 195 130 Z" />
    
    <!-- Small crescent-like symbols (Harakat) -->
    <path d="M 150 140 C 152 135, 158 135, 162 142 C 160 145, 154 145, 150 140 Z" />
    <path d="M 330 140 C 332 135, 338 135, 342 142 C 340 145, 334 145, 330 140 Z" />
    
    <!-- Small dots for Nuqta -->
    <circle cx="210" cy="285" r="5" />
    <circle cx="225" cy="290" r="5" />
    <circle cx="285" cy="285" r="5" />
    <circle cx="300" cy="290" r="5" />
    <circle cx="140" cy="245" r="5" />
    <circle cx="365" cy="245" r="5" />

    <!-- Additional Elegant Diacritical Strokes -->
    <path d="M 175 190 Q 185 180, 190 195 Q 180 205, 175 190 Z" />
    <path d="M 315 190 Q 325 180, 330 195 Q 320 205, 315 190 Z" />
    <path d="M 245 255 Q 255 245, 260 260 Q 250 270, 245 255 Z" />
    
    <!-- Swirling tail curves -->
    <path d="M 360 310 C 380 310, 400 295, 410 280 C 405 295, 385 325, 360 325 Z" />
    <path d="M 140 310 C 120 310, 100 295, 90 280 C 95 295, 115 325, 140 325 Z" />
  </g>
</svg>
